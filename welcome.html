<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<meta charset="UTF-8">
<title>Tree Generator</title>

<style>
#qrcode {
    margin-top: 20px;
    padding: 10px;
    background: white;
    border-radius: 10px;
}
.footer {
    margin-top: 40px;
    font-size: 14px;
    opacity: 0.8;
    letter-spacing: 1px;
}
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;

    background: url('wallpaper.jpg') no-repeat center center fixed;
    background-size: cover;
}

/* Dark overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* Center container */
.container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    animation: fadeIn 1.5s ease;
}

/* Title */
h1 {
    font-size: 60px;
    margin: 0;
    letter-spacing: 2px;
}

/* Description */
p {
    font-size: 20px;
    margin-top: 15px;
    opacity: 0.9;
}

/* Button */
button {
    margin-top: 30px;
    padding: 12px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: #22c55e;
    color: white;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background: #16a34a;
}

/* Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
    <h1>🌳 Tree Generator</h1>
    <p>BUILDING YOUR TRESS EFFICIENTLY</p>

    <button onclick="enterApp()">Enter Dashboard</button>

    <div class="footer">
        Created by <b>Niharika Chaturvedi</b> and <b>Ashmit Pratap Singh</b>
    </div>
<div id="qrcode"></div>
</div>

<script>
function enterApp() {
    window.location.href = "index.html"; // opens your dashboard
}

// Run after page loads
window.addEventListener("load", function() {
    const qrContainer = document.getElementById("qrcode");

    if (qrContainer) {
new QRCode(qrContainer, {
    text: "https://sensational-tartufo-cad961.netlify.app/",
    width: 120,
    height: 120
});
    }
});
</script>
<script>
function enterApp() {
    window.location.href = "index.html";
}
</script></body>
</html>
